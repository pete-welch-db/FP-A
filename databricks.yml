bundle:
  name: nova-molding-fpa-demo

variables:
  catalog:
    default: nova_molding_demo
  schema:
    default: fpa
  warehouse_id:
    description: "Serverless SQL Warehouse ID"
    default: "148ccb90800933a1"

workspace:
  host: https://adb-984752964297111.11.azuredatabricks.net
  profile: DEFAULT
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: nova_molding_demo
      schema: fpa_dev
  staging:
    variables:
      catalog: nova_molding_demo_staging
      schema: fpa
  prod:
    mode: production
    variables:
      catalog: nova_molding_demo
      schema: fpa

include:
  - "resources/*.yml"

resources:
  pipelines:
    dlt_medallion:
      name: "nova-molding-fpa-medallion-${bundle.target}"
      serverless: true
      catalog: ${var.catalog}
      schema: ${var.schema}
      libraries:
        - notebook:
            path: pipelines/dlt_medallion.py
      photon: true
      continuous: false
      configuration:
        pipeline.catalog: ${var.catalog}
        pipeline.schema: ${var.schema}

  jobs:
    data_pipeline:
      name: "nova-molding-fpa-pipeline-${bundle.target}"
      tasks:
        - task_key: setup
          notebook_task:
            notebook_path: notebooks/00_common_setup.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: generate_bronze
          depends_on:
            - task_key: setup
          notebook_task:
            notebook_path: notebooks/01_generate_bronze.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: run_dlt
          depends_on:
            - task_key: generate_bronze
          pipeline_task:
            pipeline_id: ${resources.pipelines.dlt_medallion.id}

        - task_key: ml_training
          depends_on:
            - task_key: run_dlt
          notebook_task:
            notebook_path: notebooks/03_ml_training.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: gold_metrics
          depends_on:
            - task_key: run_dlt
            - task_key: ml_training
          notebook_task:
            notebook_path: notebooks/04_gold_metrics.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: grant_app_uc_permissions
          depends_on:
            - task_key: gold_metrics
          notebook_task:
            notebook_path: scripts/grant_app_uc_permissions.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              app_name: nova-molding-fpa-lite-${bundle.target}

        - task_key: deploy_genie
          depends_on:
            - task_key: grant_app_uc_permissions
          notebook_task:
            notebook_path: scripts/deploy_genie_space.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              warehouse_id: ${var.warehouse_id}

  dashboards:
    nova_molding_fpa:
      display_name: "Nova Molding Systems FP&A Executive Dashboard"
      file_path: resources/dashboards/nova_molding_fpa.lvdash.json
      warehouse_id: ${var.warehouse_id}
      embed_credentials: true
    nova_molding_fpa_metrics_v2:
      display_name: "Nova Molding Systems FP&A Executive Dashboard (Metrics V2)"
      file_path: resources/dashboards/nova_molding_fpa_metrics_v2.lvdash.json
      warehouse_id: ${var.warehouse_id}
      embed_credentials: true

  apps:
    nova_molding_fpa_lightweight_app:
      name: "nova-molding-fpa-lite-${bundle.target}"
      source_code_path: app/
      description: "Nova Molding Systems FP&A Lightweight 5-Minute Demo"
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
